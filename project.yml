name: termo
options:
  bundleIdPrefix: com.termo
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: termo-Bridging-Header.h
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_ENTITLEMENTS: termo.entitlements
    INFOPLIST_FILE: Resources/Info.plist

targets:
  termo:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources
        type: group
        excludes:
          - Info.plist
      - path: electrobun/dist
        type: group
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termo.app
        PRODUCT_NAME: termo
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)"
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - Metal
          - "-framework"
          - QuartzCore
          - "-framework"
          - IOSurface
          - "-framework"
          - UniformTypeIdentifiers
          - "-framework"
          - Carbon
    dependencies:
      - framework: ghostty/macos/GhosttyKit.xcframework
        embed: false
